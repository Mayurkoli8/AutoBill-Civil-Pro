<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AutoBill Civil Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--s:#fff;--s2:#f0ede6;--s3:#e6e2da;--br:#d8d4cc;--br2:#b8b4aa;
  --k:#1a1a18;--k2:#2c2c2a;--k3:#5a5a56;--k4:#9a9990;
  --am:#c47c0a;--am2:#e89010;--am-bg:#fffbeb;--am-bd:#f5c842;
  --tl:#0b7a69;--tl2:#0d9488;--tl-bg:#f0fdfa;--tl-bd:#5eead4;
  --rd:#b83232;--rd-bg:#fef2f2;--rd-bd:#fca5a5;
  --gr:#1d7a3a;--gr-bg:#f0fdf4;--gr-bd:#86efac;
  --or:#c2410c;--or-bg:#fff7ed;--or-bd:#fed7aa;
  --bl:#1d5fa8;--bl-bg:#eff6ff;--bl-bd:#bfdbfe;
  --sb:#111827;--mono:'Courier New',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:7px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--k);font-size:14px}
button,input,select,textarea{font-family:var(--sans)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:232px;background:var(--sb);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sb-logo{padding:14px 13px 12px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.sb-mark{width:28px;height:28px;background:var(--am2);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-size:12px;font-weight:600;color:#fff}
.sb-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.sb-sec{padding:8px 0 2px}
.sb-lbl{font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 13px 4px}
.sb-btn{display:flex;align-items:center;gap:7px;padding:6px 13px;font-size:11.5px;cursor:pointer;color:rgba(255,255,255,.58);border:none;background:none;width:100%;text-align:left;transition:all .1s}
.sb-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-btn.active{background:rgba(196,124,10,.22);color:#fbbf24;border-left:2px solid var(--am2);padding-left:11px}
.sb-div{height:1px;background:rgba(255,255,255,.07);margin:5px 0}
.sb-proj-list{padding:3px 8px 7px}
.sb-proj-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background .1s;border:1px solid transparent}
.sb-proj-item:hover{background:rgba(255,255,255,.06)}
.sb-proj-item.active{background:rgba(196,124,10,.18);border-color:rgba(196,124,10,.3)}
.sb-proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-proj-name{font-size:11px;color:rgba(255,255,255,.8);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.sb-proj-meta{font-size:9px;color:rgba(255,255,255,.3)}
.sb-add-proj{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:5px;cursor:pointer;color:rgba(255,255,255,.4);font-size:11px;border:1px dashed rgba(255,255,255,.14);margin:3px 0;background:none;width:100%;transition:all .1s}
.sb-add-proj:hover{border-color:var(--am-bd);color:#fbbf24;background:rgba(196,124,10,.1)}
.guard-badge{margin:5px 8px 2px;border-radius:6px;padding:6px 9px;font-size:10.5px;display:none}
.guard-badge.show{display:block}
.guard-badge.err{background:rgba(184,50,50,.2);border:1px solid rgba(184,50,50,.35);color:#fca5a5}
.guard-badge.warn{background:rgba(194,65,12,.18);border:1px solid rgba(194,65,12,.3);color:#fed7aa}
.guard-badge.ok{background:rgba(13,148,136,.14);border:1px solid rgba(13,148,136,.28);color:#5eead4}
.guard-title{font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.sb-totals{padding:3px 0}
.sb-tv{padding:4px 13px;display:flex;flex-direction:column;margin-bottom:1px}
.sb-tl{font-size:8px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1px}
.sb-tv-val{font-size:14px;font-weight:500;font-family:var(--mono);color:#fff}
.sb-tv-val.am{color:#fbbf24}
.sb-shortcuts{padding:8px 13px 12px;font-size:9.5px;color:rgba(255,255,255,.22);border-top:1px solid rgba(255,255,255,.06);margin-top:auto}
.sc-row{display:flex;justify-content:space-between;margin-bottom:2px}
.sc-key{background:rgba(255,255,255,.1);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--s);border-bottom:1px solid var(--br);padding:0 16px;height:46px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.ptitle{font-size:13px;font-weight:600;color:var(--k)}
.psub{font-size:11px;color:var(--k3);white-space:nowrap}
.tacts{display:flex;gap:5px;align-items:center;flex-shrink:0}
.content-wrap{flex:1;overflow:auto}
.content{padding:16px}
.tabs{display:flex;background:var(--s);border-bottom:1px solid var(--br);padding:0 16px;flex-shrink:0;overflow-x:auto}
.tab{padding:9px 13px;font-size:11.5px;cursor:pointer;color:var(--k3);border-bottom:2px solid transparent;margin-bottom:-1px;border:none;background:none;white-space:nowrap;transition:all .12s}
.tab:hover{color:var(--k)}.tab.active{color:var(--am);border-bottom:2px solid var(--am);font-weight:500}

/* ── BUTTONS ── */
.btn{padding:5px 11px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;border:1px solid var(--br);background:var(--s);color:var(--k2);white-space:nowrap}
.btn:hover{background:var(--s2)}.btn.pri{background:var(--k);color:#fff;border-color:var(--k)}.btn.pri:hover{background:var(--k2)}
.btn.am{background:var(--am);color:#fff;border-color:var(--am)}.btn.am:hover{background:#a56308}
.btn.tl{background:var(--tl);color:#fff;border-color:var(--tl)}.btn.tl:hover{background:#095e52}
.btn.rd{background:var(--rd);color:#fff;border-color:var(--rd)}
.btn.ghost{border-color:transparent;background:transparent}.btn.ghost:hover{background:var(--s2)}
.btn.sm{padding:3px 9px;font-size:10.5px}.btn.xs{padding:2px 7px;font-size:10px}
.btn:disabled{opacity:.45;cursor:not-allowed}.wf{width:100%}

/* ── ONBOARDING ── */
.onboard-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 46px);padding:24px}
.onboard-card{background:var(--s);border:1px solid var(--br);border-radius:14px;padding:32px 36px;max-width:520px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.onboard-logo{width:52px;height:52px;background:var(--am2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.onboard-title{font-size:22px;font-weight:600;color:var(--k);margin-bottom:8px}
.onboard-sub{font-size:13px;color:var(--k3);line-height:1.6;margin-bottom:24px}
.onboard-features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;text-align:left}
.onboard-feat{background:var(--s2);border-radius:8px;padding:11px 13px}
.of-icon{font-size:18px;margin-bottom:5px}
.of-title{font-size:12px;font-weight:600;color:var(--k);margin-bottom:2px}
.of-desc{font-size:10.5px;color:var(--k3);line-height:1.4}
.onboard-start{display:flex;gap:9px;justify-content:center}

/* ── HOME ── */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;margin-top:4px}
.proj-card{background:var(--s);border:1.5px solid var(--br);border-radius:10px;padding:15px;cursor:pointer;transition:all .15s;position:relative}
.proj-card:hover{border-color:var(--am-bd);box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.proj-card.active-card{border-color:var(--tl-bd);background:var(--tl-bg)}
.proj-card-dot{width:10px;height:10px;border-radius:50%;margin-bottom:9px}
.proj-card-name{font-size:13px;font-weight:600;color:var(--k);margin-bottom:3px}
.proj-card-meta{font-size:10.5px;color:var(--k3);margin-bottom:9px;line-height:1.5}
.proj-card-stats{display:flex;gap:11px;font-size:10px;color:var(--k3)}
.proj-card-stats b{color:var(--k);font-weight:600}
.proj-card-badge{position:absolute;top:11px;right:11px;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:500}
.add-proj-card{border-style:dashed;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;color:var(--k3);transition:all .15s;background:transparent}
.add-proj-card:hover{border-color:var(--am-bd);color:var(--am);background:var(--am-bg)}
.add-proj-icon{font-size:26px;margin-bottom:7px;opacity:.45}

/* ── CARDS ── */
.card{background:var(--s);border:1px solid var(--br);border-radius:var(--radius);overflow:hidden}
.card-h{padding:10px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.card-t{font-size:12px;font-weight:600;color:var(--k)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:13px}
.kpi{background:var(--s);border:1px solid var(--br);border-radius:var(--radius);padding:12px 14px}
.kpi-l{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--k3);margin-bottom:4px}
.kpi-v{font-size:19px;font-weight:500;font-family:var(--mono);color:var(--k);line-height:1}
.kpi-v.am{color:var(--am)}.kpi-v.tl{color:var(--tl)}.kpi-v.rd{color:var(--rd)}
.kpi-s{font-size:10px;color:var(--k3);margin-top:3px}

/* ── BOQ ── */
.boq-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:13px}
.boq-stat{background:var(--s);border:1px solid var(--br);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:11px}
.boq-stat-ico{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.boq-stat-label{font-size:10px;color:var(--k3);margin-bottom:2px}
.boq-stat-val{font-size:17px;font-weight:500;font-family:var(--mono)}
.rule-box{background:var(--bl-bg);border:1px solid var(--bl-bd);border-radius:var(--radius);padding:10px 13px;margin-bottom:12px;font-size:11.5px;color:var(--bl);line-height:1.7}
.boq-table{width:100%;border-collapse:collapse;font-size:11.5px}
.boq-table th{background:var(--k);color:rgba(255,255,255,.82);padding:7px 10px;font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;text-align:left}
.boq-table th.r{text-align:right}
.boq-table td{padding:8px 10px;border-bottom:1px solid var(--s2);vertical-align:middle}
.boq-table td.r{text-align:right;font-family:var(--mono);font-size:11px}
.boq-table tr:hover td{background:var(--s2)}
.boq-table tr.over td{background:#fff1f2}.boq-table tr.near td{background:#fffbeb}
.sp{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.sp-ok{background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr-bd)}
.sp-near{background:var(--am-bg);color:var(--am);border:1px solid var(--am-bd)}
.sp-over{background:var(--rd-bg);color:var(--rd);border:1px solid var(--rd-bd)}
.sp-none{background:var(--s2);color:var(--k3);border:1px solid var(--br)}
.boq-prog{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:80px}
.boq-prog-fill{height:100%;border-radius:3px}
.bpf-ok{background:var(--tl)}.bpf-near{background:var(--am2)}.bpf-over{background:var(--rd)}
.boq-sec-hdr{background:var(--am-bg);border:1px solid var(--am-bd);border-radius:5px;padding:6px 11px;margin:9px 0 4px;font-size:10.5px;font-weight:600;color:var(--am)}
.alert-banner{background:var(--rd-bg);border:1px solid var(--rd-bd);border-radius:var(--radius);padding:10px 13px;margin-bottom:12px;display:flex;gap:9px}
.ab-t{font-size:12px;font-weight:600;color:var(--rd);margin-bottom:3px}
.ab-b{font-size:11px;color:var(--k2);line-height:1.6}
.warn-banner{background:var(--or-bg);border:1px solid var(--or-bd);border-radius:var(--radius);padding:10px 13px;margin-bottom:12px;display:flex;gap:9px}
.wb-t{font-size:12px;font-weight:600;color:var(--or);margin-bottom:3px}

/* ── MB ── */
.mb-item{background:var(--s);border:1px solid var(--br);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.mb-item.b-over{border-color:var(--rd-bd);border-width:1.5px}.mb-item.b-near{border-color:var(--am-bd);border-width:1.5px}
.mb-hdr{padding:8px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;transition:background .1s}
.mb-hdr:hover{background:var(--s2)}
.inum{font-size:9px;font-family:var(--mono);color:var(--k4);min-width:17px}
.iname{font-size:12px;font-weight:600;color:var(--k);flex:1}
.itag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:500;border:1px solid;white-space:nowrap}
.t-earth{background:#fff7ed;color:#c2410c;border-color:#fed7aa}.t-conc{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-bd)}
.t-mas{background:#fdf4ff;color:#86198f;border-color:#e9d5ff}.t-fin{background:var(--gr-bg);color:var(--gr);border-color:var(--gr-bd)}
.t-stl{background:#f1f5f9;color:#475569;border-color:#cbd5e1}.t-pip{background:var(--tl-bg);color:var(--tl);border-color:var(--tl-bd)}
.t-misc{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}.t-ded{background:var(--rd-bg);color:var(--rd);border-color:var(--rd-bd)}
.itot{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tl);white-space:nowrap}
.chev{width:13px;height:13px;transition:transform .2s;color:var(--k4);flex-shrink:0}.chev.open{transform:rotate(90deg)}
.limit-bar{padding:5px 12px;background:var(--s2);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:9px;font-size:10.5px;flex-wrap:wrap}
.lb-track{flex:1;min-width:60px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.lb-fill{height:100%;border-radius:3px;transition:width .4s}
.boq-link-sel{border:1px solid var(--br);border-radius:4px;padding:2px 6px;font-size:10px;background:var(--s2);color:var(--k3);cursor:pointer;outline:none;max-width:200px}
.boq-link-sel:focus{border-color:var(--am-bd)}.boq-link-sel.linked{background:var(--tl-bg);color:var(--tl);border-color:var(--tl-bd);font-weight:500}
.mb-table-wrap{overflow-x:auto}
.mbt{width:100%;border-collapse:collapse;font-size:11.5px}
.mbt th{background:var(--s2);padding:5px 8px;text-align:left;font-size:8.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--k3);border-bottom:1px solid var(--br)}
.mbt th.r{text-align:right}
.mbt td{padding:0;border-bottom:1px solid var(--s2);vertical-align:middle}.mbt tr:last-child td{border-bottom:none}
.mbt tr.dr td{background:#fef2f2}.mbt tr.fr td{background:#fffbeb}
.rn{padding:5px 4px 5px 9px;font-size:9px;color:var(--k4);font-family:var(--mono);text-align:center;min-width:25px;width:25px}
.ci{width:100%;height:30px;padding:5px 8px;border:none;background:transparent;font-size:11.5px;font-family:var(--sans);color:var(--k);outline:none}
.ci:focus{background:#fffef5;box-shadow:inset 0 0 0 1.5px var(--am-bd)}.ci.mo{font-family:var(--mono);text-align:right}
.qtd{padding:5px 8px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--k2);background:var(--s2);white-space:nowrap;min-width:65px}
.qtd.neg{color:var(--rd)}.qtd.nil{color:var(--k4)}
.dcell{display:flex;align-items:center;justify-content:center;padding:0 6px;width:34px}
.dbtn{width:19px;height:19px;border-radius:3px;border:1px solid var(--br2);background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--k4);transition:all .12s;font-weight:700;line-height:1}
.dbtn:hover{border-color:var(--rd);color:var(--rd);background:var(--rd-bg)}.dbtn.on{background:var(--rd);border-color:var(--rd);color:#fff}
.delbtn{width:21px;height:21px;border:none;background:none;cursor:pointer;color:var(--k4);display:flex;align-items:center;justify-content:center;border-radius:3px;margin:0 3px;transition:all .12s}
.delbtn:hover{background:var(--rd-bg);color:var(--rd)}
.movebtn{width:18px;height:18px;border:none;background:none;cursor:pointer;color:var(--k4);display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .12s;padding:0}
.movebtn:hover{background:var(--s3);color:var(--k2)}.movebtn:disabled{opacity:.2;cursor:default}
.mb-foot{padding:6px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-top:1px solid var(--br);gap:8px;flex-wrap:wrap}
.fhint{font-size:9.5px;color:var(--k4);font-family:var(--mono)}
.nq{display:flex;align-items:center;gap:7px;font-size:11px}
.nq-lbl{color:var(--k3)}.nq-val{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--tl)}
.nq-amt{font-size:10.5px;color:var(--k3)}

/* ── BILL ── */
.bill-layout{display:grid;grid-template-columns:1fr 270px;gap:12px}
.blt{width:100%;border-collapse:collapse;font-size:11.5px}
.blt th{background:var(--k);color:rgba(255,255,255,.82);padding:6px 10px;font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;text-align:left}
.blt th:not(:first-child){text-align:right}
.blt td{padding:8px 10px;border-bottom:1px solid var(--s2);vertical-align:middle}
.blt td:not(:first-child){text-align:right;font-family:var(--mono);font-size:11px}
.blt tr:hover td{background:var(--s2)}
.blt tr.trow td{background:var(--am-bg);border-top:2px solid var(--am-bd);font-weight:600;border-bottom:none;font-size:12px}
.blt tr.trow td:not(:first-child){color:var(--am)}
.blt tr.prow td{color:var(--rd)}.blt tr.nrow td{background:var(--tl-bg);font-weight:600;color:var(--tl)}
.rate-inp{border:1px solid var(--br);border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:11px;width:82px;text-align:right;background:#fff;color:var(--k);outline:none}
.rate-inp:focus{border-color:var(--am-bd)}.rate-inp.mis{border-color:var(--rd-bd);background:var(--rd-bg)}
.hi{border:1px solid var(--br);border-radius:6px;padding:9px 12px;margin-bottom:8px;background:var(--s)}
.hi.cur{border-color:var(--tl-bd);background:var(--tl-bg)}
.hi-t{font-size:11px;font-weight:600;margin-bottom:2px}.hi-m{font-size:9.5px;color:var(--k3);display:flex;gap:7px;align-items:center;margin-bottom:5px}
.hi-a{font-family:var(--mono);font-size:15px;font-weight:500}.hi-a.tl{color:var(--tl)}
.tag{display:inline-block;font-size:8.5px;padding:2px 6px;border-radius:10px;font-weight:500}
.tg-gr{background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr-bd)}.tg-am{background:var(--am-bg);color:var(--am);border:1px solid var(--am-bd)}
.prog-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:2px}
.pf-am{background:linear-gradient(90deg,var(--am),var(--am2))}.pf-tl{background:linear-gradient(90deg,var(--tl),var(--tl2))}

/* ── IMPORT ── */
.imp-layout{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.imp-ta{width:100%;min-height:240px;padding:11px;border:1.5px solid var(--br);border-radius:var(--radius);font-family:var(--mono);font-size:11px;color:var(--k);background:#fff;outline:none;resize:vertical;line-height:1.7}
.imp-ta:focus{border-color:var(--am-bd)}
.imp-eg{background:var(--am-bg);border:1px solid var(--am-bd);border-radius:6px;padding:10px 12px;margin-bottom:11px}
.egt{font-weight:600;color:var(--am);font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.eg-row{font-family:var(--mono);font-size:10px;color:var(--k2);margin-bottom:2px;display:flex;gap:7px}
.eg-f{color:var(--am);min-width:100px;font-size:9px;font-family:var(--sans);opacity:.75}
.pp{background:var(--s2);border-radius:var(--radius);padding:11px;min-height:240px}
.pp-row{display:grid;grid-template-columns:25px 1fr 38px 44px 44px 44px 36px;gap:0;border-bottom:1px solid var(--br);padding:3px 0;align-items:center}
.pp-row.ph{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--k3);background:var(--s3);padding:5px 0;border-radius:4px 4px 0 0}
.pp-c{padding:0 4px;font-family:var(--mono);font-size:10.5px;color:var(--k2)}.pp-c.d{font-family:var(--sans);font-size:11px;color:var(--k)}
.sel{border:1px solid var(--br);border-radius:5px;padding:4px 8px;font-size:11px;background:#fff;color:var(--k);cursor:pointer;outline:none;width:100%}
.sel:focus{border-color:var(--am-bd)}

/* ── EXPORT ── */
.exp-layout{display:grid;grid-template-columns:1fr 205px;gap:12px}
.pdf-paper{background:#fff;border:1px solid var(--br);border-radius:6px;padding:18px 20px}
.pdf-hdr{background:var(--k);padding:9px 0;text-align:center;margin:-18px -20px 13px;border-radius:5px 5px 0 0}
.pdf-ht{font-size:12px;font-weight:700;letter-spacing:.06em;color:#fff;text-transform:uppercase}
.pdf-hs{font-size:9px;color:rgba(255,255,255,.5);margin-top:2px}
.pdf-mg{display:grid;grid-template-columns:1fr 1fr;gap:3px 13px;margin-bottom:12px;font-size:10px}
.pdf-mr{display:flex;gap:4px}.pdf-mk{color:var(--k3);min-width:72px}.pdf-mv{color:var(--k);font-weight:500}
.pdf-t{width:100%;border-collapse:collapse;font-size:9.5px;margin-bottom:9px}
.pdf-t th{border:1px solid var(--k);padding:3px 5px;background:var(--s2);font-weight:600;font-size:8.5px;text-align:center}
.pdf-t td{border:1px solid var(--br);padding:3px 5px}
.pdf-t td.r{text-align:right;font-family:var(--mono)}.pdf-t td.c{text-align:center}
.pdf-t tr.ih td{background:var(--am-bg);font-weight:600;color:var(--am);border-left:2px solid var(--am)}
.pdf-t tr.tot td{background:var(--s2);font-weight:700;border-top:2px solid var(--br2)}
.pdf-t tr.net td{background:var(--tl-bg);font-weight:700;color:var(--tl)}
.pdf-t tr.ded td{color:var(--rd);background:var(--rd-bg)}
.pdf-sign{display:flex;justify-content:space-between;margin-top:14px;padding-top:9px;border-top:1px dashed var(--br2)}
.sign-bx{text-align:center;font-size:8.5px;color:var(--k3)}.sign-ln{height:1px;background:var(--k2);width:80px;margin:0 auto 3px}
.exp-btns{display:flex;flex-direction:column;gap:7px}
.exp-btn{display:flex;align-items:center;gap:8px;padding:10px 11px;border:1.5px solid var(--br);border-radius:var(--radius);background:#fff;cursor:pointer;transition:all .12s;width:100%}
.exp-btn:hover{border-color:var(--am-bd);background:var(--am-bg)}
.exp-btn.pri{background:var(--k);border-color:var(--k)}.exp-btn.pri:hover{background:var(--k2)}
.eb-ico{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.eb-t{font-size:11.5px;font-weight:600}.eb-s{font-size:9.5px;color:var(--k3);margin-top:1px}
.exp-btn.pri .eb-s{color:rgba(255,255,255,.5)}.exp-btn.pri .eb-t{color:#fff}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(17,24,39,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mhdr{padding:13px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt-m{font-size:13.5px;font-weight:600}
.mbody{overflow-y:auto;padding:15px;flex:1}
.form-row{margin-bottom:12px}
.form-label{font-size:10.5px;font-weight:600;color:var(--k3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.07em}
.form-input{width:100%;padding:7px 10px;border:1.5px solid var(--br);border-radius:6px;font-size:13px;color:var(--k);outline:none;transition:border .12s}
.form-input:focus{border-color:var(--am-bd)}.form-input.sm{font-size:12px;padding:5px 9px}
.color-picker{display:flex;gap:7px;flex-wrap:wrap}
.cp-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cp-dot.sel{border-color:var(--k);transform:scale(1.15)}

/* ── SAVE INDICATOR ── */
.save-pill{position:fixed;bottom:18px;right:18px;background:#111827;color:#fff;font-size:11px;padding:7px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.save-dot{width:7px;height:7px;border-radius:50%;background:#5eead4;flex-shrink:0}

/* ── MISC ── */
.notice{background:var(--tl-bg);border:1px solid var(--tl-bd);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--tl)}
.warn-box{background:var(--rd-bg);border:1px solid var(--rd-bd);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--rd)}
.sec-t{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--k3);margin-bottom:8px}
.empty{text-align:center;padding:40px 20px;color:var(--k3)}
.empty-i{font-size:36px;margin-bottom:9px;opacity:.35}.empty-t{font-size:13px;font-weight:500;color:var(--k);margin-bottom:5px}.empty-s{font-size:11.5px;margin-bottom:13px}
.mb10{margin-bottom:10px}.mb13{margin-bottom:13px}.mt8{margin-top:8px}.mt10{margin-top:10px}
@media print{.sb,.topbar,.tabs,.tacts,.exp-btns,.save-pill{display:none!important}.app{display:block}.content-wrap{overflow:visible}}
/* ── VISUAL CALC ── */
.vc-shape-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.vc-sbtn{padding:6px 12px;border-radius:6px;border:1.5px solid var(--br);background:var(--s);cursor:pointer;font-size:11.5px;display:flex;align-items:center;gap:5px;transition:all .12s;font-family:var(--sans)}
.vc-sbtn:hover{border-color:var(--am-bd);background:var(--am-bg)}
.vc-sbtn.on{border-color:var(--am);background:var(--am-bg);color:var(--am);font-weight:600}
.vc-layout{display:grid;grid-template-columns:1fr 238px;gap:13px;align-items:start}
.vc-canvas{background:var(--s);border:1px solid var(--br);border-radius:var(--radius);overflow:hidden;user-select:none}
.vc-canvas svg{display:block;width:100%;height:auto;cursor:default}
.vc-handle{cursor:grab}.vc-handle:active{cursor:grabbing}
.vc-panel{background:var(--s);border:1px solid var(--br);border-radius:var(--radius);padding:13px}
.vc-dim-row{margin-bottom:11px}
.vc-dim-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--k3);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.vc-dim-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--am)}
.vc-slider{width:100%;accent-color:var(--am);margin:3px 0;height:4px;cursor:pointer}
.vc-num{width:62px;border:1px solid var(--br);border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:11.5px;text-align:right;color:var(--k);background:#fff;outline:none}
.vc-num:focus{border-color:var(--am-bd)}
.vc-calc-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--s2);font-size:11.5px}
.vc-cval{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--am)}
.vc-cval.sm{font-size:11px;color:var(--k2);font-weight:400}
.vc-formula{background:var(--s2);border-radius:5px;padding:7px 10px;font-family:var(--mono);font-size:9.5px;color:var(--k3);margin-top:8px;line-height:1.7}
.vc-nos-row{display:flex;align-items:center;gap:8px;margin:10px 0;padding:9px 0;border-top:1px solid var(--s3);border-bottom:1px solid var(--s3)}
.vc-nos-inp{width:54px;border:1px solid var(--br);border-radius:4px;padding:4px 7px;font-size:13px;font-family:var(--mono);text-align:center;outline:none}
.vc-nos-inp:focus{border-color:var(--am-bd)}
.vc-hint{font-size:10px;color:var(--k4);line-height:1.6;margin-top:8px;padding:8px 10px;background:var(--s2);border-radius:5px}
.vc-ded-section{margin-top:11px;padding-top:10px;border-top:1px solid var(--s3)}
.vc-ded-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.vc-ded-row{display:flex;align-items:center;gap:5px;padding:4px 0;font-size:11px;border-bottom:1px dashed var(--s3)}
.vc-ded-lbl{flex:1;color:var(--k2);font-family:var(--mono);font-size:10.5px}
.vc-ded-del{width:18px;height:18px;border-radius:50%;border:none;background:var(--rd-bg);color:var(--rd);cursor:pointer;font-size:10px;flex-shrink:0;padding:0;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.vc-add-ded-row{display:flex;gap:4px;margin-top:7px;align-items:center}
.vc-add-ded-inp{border:1px solid var(--br);border-radius:4px;padding:3px 5px;font-size:11px;font-family:var(--mono);width:50px;outline:none;text-align:center;background:#fff}
.vc-add-ded-inp:focus{border-color:var(--am-bd)}
.vc-ded-tags{display:flex;gap:5px;margin-bottom:6px}
.vc-ded-tag{padding:3px 9px;border-radius:4px;border:1.5px solid var(--br);background:var(--s2);cursor:pointer;font-size:11px;transition:all .1s}
.vc-ded-tag.on{border-color:var(--am);background:var(--am-bg);color:var(--am);font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="sb" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:8px;min-width:0">
        <span class="ptitle" id="title-bar">AutoBill Civil Pro</span>
        <span class="psub" id="bill-bar"></span>
      </div>
      <div class="tacts" id="top-actions"></div>
    </div>
    <div class="tabs" id="tabs-bar"></div>
    <div class="content-wrap"><div class="content" id="main-content"></div></div>
  </div>
</div>
<div class="ov" id="modal-ov" style="display:none" onclick="if(event.target===this)closeModal()"></div>
<div class="save-pill" id="save-pill"><div class="save-dot"></div><span>Saved</span></div>

<script>
'use strict';
/* ═══════ HELPERS ═══════ */
function uid(){return Math.random().toString(36).slice(2,8)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function inr(n){return '\u20b9'+Math.round(n).toLocaleString('en-IN')}
function nr(o){return Object.assign({id:uid(),desc:'',nos:'',L:'',B:'',D:'',isDeduct:false},o||{})}
function evalF(v){
  if(v===''||v===null)return null;
  var s=String(v).trim().replace(/\u03c0|pi/gi,String(Math.PI));
  if(!s||s==='0')return 0;
  try{var r=Function('"use strict";return('+s+')')();return isFinite(r)?+r.toFixed(6):null}catch(e){return parseFloat(v)||0}
}
function calcQ(row){
  var n=evalF(row.nos);if(n===null)n=1;
  var l=evalF(row.L);if(l===null)l=0;
  var b=evalF(row.B);if(b===null)b=1;
  var d=evalF(row.D);if(d===null)d=1;
  if(l===0&&b===1&&d===1)return null;
  return +(n*l*b*d).toFixed(3);
}
function netQ(item){
  var t=0;item.rows.forEach(function(r){var q=calcQ(r);if(q!==null)t+=r.isDeduct?-q:q;});
  return +Math.max(0,t).toFixed(3);
}
const COLORS=['#c47c0a','#0b7a69','#1d5fa8','#86198f','#c2410c','#e11d48','#0369a1','#15803d','#b45309','#7c3aed'];
const CAT_TAG={Earthwork:'t-earth',Concrete:'t-conc',Masonry:'t-mas',Finishing:'t-fin',Steel:'t-stl',Pipeline:'t-pip',Misc:'t-misc'};
const STD_LIB=[
  {id:'exc',cat:'Earthwork',name:'Excavation in Foundation',unit:'Cum',rate:464},
  {id:'pcc',cat:'Concrete',name:'PCC M150 in Foundation',unit:'Cum',rate:6771.29},
  {id:'rcc_col',cat:'Concrete',name:'RCC M300 in Columns',unit:'Cum',rate:10206.85},
  {id:'rcc_sl',cat:'Concrete',name:'RCC M250 in Beams/Slabs',unit:'Cum',rate:9795.85},
  {id:'bw_sup',cat:'Masonry',name:'Brickwork in Superstructure CM 1:6',unit:'Cum',rate:8559.97},
  {id:'plstr',cat:'Finishing',name:'Plaster 12mm (1:3)',unit:'Sqm',rate:274.69},
  {id:'steel',cat:'Steel',name:'Reinforcement Steel Tor Fe500',unit:'MT',rate:97206},
  {id:'pvc_90',cat:'Pipeline',name:'PVC Pipe 90mm 4kg (Supply)',unit:'Rmt',rate:197},
  {id:'pvc_160',cat:'Pipeline',name:'PVC Pipe 160mm 6kg (Supply)',unit:'Rmt',rate:956},
  {id:'ref_trench',cat:'Earthwork',name:'Refilling Trenches',unit:'Cum',rate:84},
  {id:'dewater',cat:'Misc',name:'Dewatering',unit:'BHP',rate:77},
  {id:'railing',cat:'Misc',name:'GI Railing 1m height',unit:'Rmt',rate:916},
];

/* ═══════ STATE + PERSISTENCE ═══════ */
var APP = {activeProjectId:null,projects:[]};
var saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{localStorage.setItem('autobill_v2',JSON.stringify(APP));}catch(e){}
    var pill=document.getElementById('save-pill');
    pill.style.opacity='1';
    setTimeout(function(){pill.style.opacity='0';},1800);
  },600);
}
function loadState(){
  try{
    var raw=localStorage.getItem('autobill_v2');
    if(raw){var saved=JSON.parse(raw);APP=saved;return true;}
  }catch(e){}
  return false;
}
function hasSavedData(){return !!localStorage.getItem('autobill_v2');}

/* ═══════ PROJECT HELPERS ═══════ */
function proj(){return APP.projects.find(function(p){return p.id===APP.activeProjectId})}
function gt(p){p=p||proj();if(!p)return 0;return p.items.reduce(function(s,it){return s+netQ(it)*it.rate},0)}
function pa(p){p=p||proj();if(!p)return 0;return p.bills.length?p.bills[p.bills.length-1].grossAmount:0}
function nt(p){p=p||proj();return Math.max(0,gt(p)-pa(p))}
function getBoq(bid){var p=proj();return p&&p.boq?(p.boq.find(function(b){return b.id===bid})||null):null}
function boqStatus(item,p){
  p=p||proj();
  if(!item.boqRef)return{status:'unlinked',pct:0};
  var b=(p.boq||[]).find(function(b2){return b2.id===item.boqRef});
  if(!b)return{status:'unlinked',pct:0};
  var used=netQ(item),max=b.qty,pct=max>0?used/max*100:0;
  var rateMis=Math.abs(item.rate-b.rate)>0.5;
  if(used>max)return{status:'over',pct:pct,msg:'EXCEEDS by '+(used-max).toFixed(3)+' '+item.unit,b:b,rateMis};
  if(pct>=90)return{status:'near',pct:pct,msg:pct.toFixed(1)+'% used',b:b,rateMis};
  return{status:'ok',pct:pct,msg:pct.toFixed(1)+'% used',b:b,rateMis};
}
function issues(p){
  p=p||proj();if(!p)return{over:0,near:0,rm:0};
  var over=0,near=0,rm=0;
  p.items.forEach(function(it){var s=boqStatus(it,p);if(s.status==='over')over++;else if(s.status==='near')near++;if(s.rateMis)rm++;});
  return{over,near,rm};
}
function makeProject(o){
  return Object.assign({id:'proj_'+uid(),name:'',contractNo:'',location:'',engineer:'',contractor:'',color:'#0b7a69',boq:[],tab:'dashboard',expanded:{},bills:[],importText:'',importTarget:'',items:[]},o||{});
}

/* ═══════ RENDER ENGINE ═══════ */
function render(){renderSB();renderTopbar();renderTabs();renderContent();}
function switchTab(t){var p=proj();if(p){p.tab=t;saveState();}render();}
function switchProject(id){APP.activeProjectId=id;saveState();render();}
function dirty(){saveState();renderSB();renderTabs();}

function renderTopbar(){
  var p=proj();
  if(!p){
    document.getElementById('title-bar').textContent='AutoBill Civil Pro';
    document.getElementById('bill-bar').textContent='';
    document.getElementById('top-actions').innerHTML='<button class="btn am sm" onclick="openNewProject()">+ New Project</button>';
    return;
  }
  document.getElementById('title-bar').textContent=p.name;
  document.getElementById('bill-bar').textContent=p.contractNo?'— '+p.contractNo:'';
  document.getElementById('top-actions').innerHTML=
    '<button class="btn ghost sm" onclick="openLib()">+ Item</button>'+
    '<button class="btn ghost sm" onclick="openVisual()" title="Visual Measurement Builder — drag shapes to set dimensions">📐 Visual</button>'+
    '<button class="btn sm" onclick="switchTab(\'import\')">Import</button>'+
    '<button class="btn ghost sm" onclick="openEditProject()" title="Edit project settings">⚙</button>'+
    '<button class="btn tl sm" onclick="recordBill()">Record Bill</button>'+
    '<button class="btn am sm" onclick="exportPDF()">Export PDF</button>';
}
function renderTabs(){
  var p=proj();
  if(!p){document.getElementById('tabs-bar').innerHTML='';return;}
  var iss=issues(p);
  var tabs=[['dashboard','Dashboard'],['boq','BOQ Guard'],['mb','Measurement Book'],['bill','Abstract'],['vc','📐 Visual Calc'],['import','Smart Import'],['export','Export']];
  document.getElementById('tabs-bar').innerHTML=tabs.map(function(x){
    var dot=x[0]==='boq'&&(iss.over>0||iss.near>0)?'<span style="width:5px;height:5px;border-radius:50%;background:'+(iss.over>0?'var(--rd)':'var(--am)')+';display:inline-block;margin-left:4px;vertical-align:middle"></span>':'';
    return'<button class="tab'+(p.tab===x[0]?' active':'')+'" onclick="switchTab(\''+x[0]+'\')">'+x[1]+dot+'</button>';
  }).join('');
}
function renderSB(){
  var p=proj();var iss=p?issues(p):{over:0,near:0,rm:0};
  var guard='';
  if(p&&p.boq&&p.boq.length){
    if(iss.over>0)guard='<div class="guard-badge show err"><div class="guard-title">\u26a0 BOQ Exceeded</div>'+iss.over+' item'+(iss.over>1?'s':'')+' over limit</div>';
    else if(iss.near>0)guard='<div class="guard-badge show warn"><div class="guard-title">\u26a1 Near Limit</div>'+iss.near+' item'+(iss.near>1?'s':'')+' at 90%+</div>';
    else if(p.items.some(function(it){return it.boqRef}))guard='<div class="guard-badge show ok"><div class="guard-title">\u2713 BOQ Clear</div>All items within limits</div>';
  }
  var projListHTML=APP.projects.map(function(pr){
    var iss2=issues(pr);
    return'<div class="sb-proj-item'+(pr.id===APP.activeProjectId?' active':'')+'" onclick="switchProject(\''+pr.id+'\')">'+
      '<div class="sb-proj-dot" style="background:'+pr.color+'"></div>'+
      '<div style="flex:1;min-width:0"><div class="sb-proj-name">'+esc(pr.name)+'</div><div class="sb-proj-meta">'+(pr.contractNo||'No contract no.')+'</div></div>'+
      (iss2.over>0?'<span style="width:7px;height:7px;border-radius:50%;background:var(--rd);flex-shrink:0"></span>':'')+'</div>';
  }).join('');
  var navHTML=p?[['dashboard','Dashboard'],['boq','BOQ Guard'],['mb','Measurement Book'],['bill','Abstract of Cost'],['vc','📐 Visual Calc'],['import','Smart Import'],['export','Export']].map(function(x){return'<button class="sb-btn'+(p.tab===x[0]?' active':'')+'" onclick="switchTab(\''+x[0]+'\')">'+x[1]+'</button>'}).join(''):'';
  var totals=p?'<div class="sb-totals"><div class="sb-tv"><div class="sb-tl">Gross Amount</div><div class="sb-tv-val am">'+inr(gt(p))+'</div></div><div class="sb-tv" style="padding-bottom:3px"><div class="sb-tl">Net This Bill</div><div class="sb-tv-val">'+inr(nt(p))+'</div></div></div>':'';
  document.getElementById('sidebar').innerHTML=
    '<div class="sb-logo"><div class="sb-mark"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="1.5" stroke="#fff" stroke-width="1.5"/><path d="M4 5h6M4 7.5h4M4 10h3" stroke="#fff" stroke-width="1.2"/></svg></div><div><div class="sb-name">AutoBill Civil Pro</div><div class="sb-sub">v2.0 \u2014 Multi-Project</div></div></div>'+
    '<div class="sb-sec"><div class="sb-lbl">Projects ('+APP.projects.length+')</div><div class="sb-proj-list">'+projListHTML+

function renderContent(){

  if(p.tab==='dashboard'){el.innerHTML=renderDash(p);initChart(p);}
  else if(p.tab==='boq')el.innerHTML=renderBOQ(p);

  '<div class="card"><div class="card-h"><span class="card-t">Item Progress</span>'+(p.boq&&p.boq.length?'<span style="font-size:10px;color:var(--k3)">vs BOQ limit</span>':'')+'</div><div style="padding:12px 13px">'+

function initChart(p){
  var cv=document.getElementById('cc');if(!cv)return;
  var ctx=cv.getContext('2d');var catMap={};
  p.items.forEach(function(it){var c=it.cat||'Misc';catMap[c]=(catMap[c]||0)+(netQ(it)*it.rate);});
  var vals=Object.values(catMap);var total=vals.reduce(function(a,b){return a+b},0);
  var cx=80,cy=80,R=68,ri=44;ctx.clearRect(0,0,160,160);
  var ang=-Math.PI/2;
  vals.forEach(function(v,i){var sw=(total?v/total:1/vals.length)*2*Math.PI;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,ang,ang+sw);ctx.closePath();ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ang+=sw;});
  ctx.beginPath();ctx.arc(cx,cy,ri,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#1a1a18';ctx.textAlign='center';ctx.textBaseline='middle';
  var lab=total>=1e7?('\u20b9'+(total/1e7).toFixed(1)+'Cr'):('\u20b9'+(total/1e5).toFixed(1)+'L');
  ctx.font='bold 11px Courier New';ctx.fillText(lab,cx,cy-5);
  ctx.font='9px -apple-system,sans-serif';ctx.fillStyle='#5a5a56';ctx.fillText('Total',cx,cy+7);
}

  }).join('');
  return ntc+html+'<button class="btn wf" style="padding:8px;border-style:dashed;color:var(--k3)" onclick="openLib()">+ Add Item from Library</button>';

/* ═══════ IMPORT ═══════ */
function parseTxt(txt){
  var lines=txt.split('\n'),res=[],desc='',isDed=false;
  lines.forEach(function(raw){
    var line=raw.trim();if(!line)return;
    if(/^(less[:\s]|deduct[:\s])/i.test(line))isDed=true;
    var m=line.match(/^([^\s\/\xd7xX]+)\s*[\/]\s*([^\s\/\xd7xX]+)\s*[\/]\s*([^\s\/\xd7xX]+)\s*(?:[\/]\s*([^\s\/\xd7xX]+))?/);
    if(m&&(parseFloat(m[1])>0||/pi/i.test(m[1]))){res.push({desc,nos:m[1],L:m[2],B:m[3],D:m[4]||'',isDeduct:isDed});desc='';isDed=false;return;}
    m=line.match(/^(\d+(?:\.\d+)?)\s*[xX\u00d7]\s*(\d+(?:\.\d+)?)\s*[xX\u00d7]\s*(\d+(?:\.\d+)?)\s*(?:[xX\u00d7]\s*(\d+(?:\.\d+)?))?/);
    if(m){res.push({desc,nos:m[1],L:m[2],B:m[3],D:m[4]||'',isDeduct:isDed});desc='';isDed=false;return;}
    desc=line;if(/less|ded/i.test(line))isDed=true;
  });return res;
}

  var parsed=p.importText?parseTxt(p.importText):[];

    '<textarea class="imp-ta" id="imp-ta" placeholder="Paste your field notebook numbers here…\n\nExamples:\n3/6.00/0.23/3.20\n2x4.50x0.23x3.20\nLess: Window openings\n6/1.20/0.23/1.50"></textarea>'+

}

/* ═══════ PDF BOQ PARSER ═══════ */
// Unit keywords to detect in BOQ rows
var UNITS_RE = /\b(Cum|Sqm|Rmt|Rmt\.|R\.M\.T|M\.T\.|MT|Nos?\.?|Sets?|BHP|Jobs?|Months?|Days?|Km|KM|RM|Ltr|Lt\.?|Kg|KG|Sqmt|Mtr)\b/i;
var UNIT_NORM = {cum:'Cum',sqm:'Sqm',sqmt:'Sqm',rmt:'Rmt','rmt.':'Rmt','r.m.t':'Rmt','m.t.':'MT',mt:'MT',no:'Nos','no.':'Nos',nos:'Nos','nos.':'Nos',sets:'Sets',set:'Sets',bhp:'BHP',job:'Job',jobs:'Job',months:'Months',month:'Months',days:'Days',day:'Days',km:'Km',rm:'Rmt',ltr:'Ltr','lt.':'Ltr',kg:'Kg',mtr:'Rmt'};

function normUnit(u){return UNIT_NORM[u.toLowerCase().replace(/\.$/,'')]||u;}

// Extract BOQ items from raw PDF text lines
function parseBOQText(lines){
  var items=[];
  var descBuf=[];
  var currentSection='General';

  // Detect section header lines (short, uppercase, no numbers)
  function isSecHeader(l){return l.length>5&&l.length<80&&!/\d{3,}/.test(l)&&/[A-Z]{3,}/.test(l)&&!/^\s*\d+\.?\s/.test(l)&&(l===l.toUpperCase()||/^[A-Z][A-Z\s\/\-&]+$/.test(l.trim()));}

  // Try to extract a data row: description? qty unit rate
  function tryParseRow(line){
    // Pattern: [optional leading desc] NUMBER UNIT NUMBER [more numbers]
    var m=line.match(/(.{0,80}?)\s+([\d,]+(?:\.\d+)?)\s+(Cum|Sqm|Rmt|MT|Nos?\.?|Sets?|BHP|Jobs?|Months?|Days?|Km|Sqmt|Mtr|Kg|Ltr|RM|M)\b\.?\s+([\d,]+(?:\.\d+)?)\s/i);
    if(!m)return null;
    var qty=parseFloat(m[2].replace(/,/g,''));
    var unit=normUnit(m[3]);
    var rate=parseFloat(m[4].replace(/,/g,''));
    if(qty<=0||rate<=0||qty>999999||rate>99999999)return null;
    return{leadDesc:m[1].trim(),qty,unit,rate};
  }

  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line||line.length<3)continue;

    // Detect section headers like "SUPPLY WELL", "APPROACH BRIDGE" etc
    if(isSecHeader(line)&&line.length<60){currentSection=line.replace(/^\d+[\.\s]*/,'').trim();descBuf=[];continue;}

    var parsed=tryParseRow(line);
    if(parsed){
      // Build description: leadDesc from this line OR accumulated descBuf
      var desc=(parsed.leadDesc||'').replace(/^\d+[\.\s]*/,'').trim();
      if(!desc&&descBuf.length>0){
        // Use last non-empty accumulated description
        desc=descBuf.filter(function(d){return d.trim().length>4}).slice(-2).join(' — ');
      }
      if(!desc)desc='Item '+(items.length+1);
      // Clean up description
      desc=desc.replace(/^\s*item\s*(no\.?)?\s*\d+[\.\s]*/i,'').replace(/\s+/g,' ').trim();
      if(desc.length>120)desc=desc.substring(0,120)+'…';
      if(desc.length>3){
        items.push({id:'b'+uid(),sec:currentSection,desc:desc,qty:qty,unit:parsed.unit,rate:parsed.rate});
      }
      descBuf=[];
    } else {
      // Accumulate as potential description text
      var clean=line.replace(/^\s*\d+[\.\s]*/,'').trim();
      if(clean.length>4&&!/^(INR|Rs\.?|Total|Amount|[\d\s,\.]+$)/.test(clean)){
        // Keep only last 3 lines of description buffer
        if(descBuf.length>=3)descBuf.shift();
        descBuf.push(clean);
      }
    }
  }
  return items;
}

function npDropPDF(e){
  e.preventDefault();
  var file=e.dataTransfer.files[0];
  if(file&&file.type==='application/pdf')npReadPDF(file);
  else toast('Please drop a PDF file');
}

function npReadPDF(file){
  if(!file)return;
  if(!window.pdfjsLib){
    toast('PDF reader not loaded — check internet connection');
    return;
  }

  // ── THE FIX ──
  // Do NOT call showModal() here. Calling showModal() destroys and rebuilds
  // the entire modal DOM while the file-input onchange event is still
  // propagating. The browser then fires stale events on the newly created
  // DOM (including the npAddBoq button), causing the spurious "qty" error.
  // Instead, just update the upload area in-place — no DOM destruction.
  NPD.pdfParsing=true;
  NPD.pdfFileName=file.name;

  // Update existing upload area to show spinner without rebuilding modal
  var uploadBox=document.getElementById('pdf-upload-area');
  if(uploadBox){
    uploadBox.style.pointerEvents='none';
    uploadBox.style.cursor='default';
    uploadBox.innerHTML=
      '<div style="font-size:26px;margin-bottom:8px">⏳</div>'+
      '<div style="font-size:13px;font-weight:600;color:var(--bl);margin-bottom:4px">Reading PDF…</div>'+
      '<div style="font-size:11px;color:var(--k3)">Extracting items, quantities &amp; rates — please wait</div>';
  }
  // Disable the Create/Save button in-place
  var saveBtn=document.querySelector('#modal-ov .btn.am.wf');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='⏳ Reading PDF — please wait…';}

  // Disable web worker — run PDF.js on main thread (avoids CDN/CSP worker issues)
  window.pdfjsLib.GlobalWorkerOptions.workerSrc='';

  var reader=new FileReader();
  reader.onerror=function(){
    NPD.pdfParsing=false; NPD.pdfFileName='';
    showModal(projModal()); // safe to full-rebuild here (no event in flight)
    toast('Could not read the file — try again');
  };
  reader.onload=function(ev){
    var typedArr=new Uint8Array(ev.target.result);
    window.pdfjsLib.getDocument({
      data: typedArr,
      disableRange: true,
      disableStream: true,
      disableAutoFetch: true
    }).promise.then(function(pdf){
      var pageTexts=new Array(pdf.numPages);
      var pagePromises=[];
      for(var pg=1;pg<=pdf.numPages;pg++){
        (function(pgNum){
          pagePromises.push(
            pdf.getPage(pgNum).then(function(page){
              return page.getTextContent().then(function(tc){
                var lineMap={};
                tc.items.forEach(function(item){
                  var y=Math.round(item.transform[5]);
                  if(!lineMap[y])lineMap[y]=[];
                  lineMap[y].push(item.str);
                });
                var ys=Object.keys(lineMap).map(Number).sort(function(a,b){return b-a;});
                pageTexts[pgNum-1]=ys.map(function(y){return lineMap[y].join(' ');});
              });
            })
          );
        })(pg);
      }
      Promise.all(pagePromises).then(function(){
        var allLines=[].concat.apply([],pageTexts.filter(Boolean));
        var items=parseBOQText(allLines);
        var manualItems=NPD.boq.filter(function(b){return !b._fromPDF;});
        NPD.boq=manualItems.concat(items.map(function(it){it._fromPDF=true;return it;}));
        NPD.pdfParsing=false;
        // NOW safe to full-rebuild — no file-input event is in flight
        showModal(projModal());
        setTimeout(function(){
          var el=document.getElementById('pdf-parse-status');
          if(el){
            el.style.display='block';
            el.innerHTML=items.length>0
              ?'<span style="color:var(--gr)">✓ <b>'+items.length+' BOQ items</b> extracted from "'+esc(file.name)+'" — review and save.</span>'
              :'<span style="color:var(--or)">⚠ No items detected — PDF may be image/scanned. Add items manually using the form below.</span>';
          }
          var mb=document.querySelector('.modal .mbody');
          if(mb)mb.scrollTop=0;
        },60);
      }).catch(function(err){
        NPD.pdfParsing=false; NPD.pdfFileName='';
        showModal(projModal());
        toast('Error processing PDF pages: '+(err.message||String(err)));
      });
    }).catch(function(err){
      NPD.pdfParsing=false; NPD.pdfFileName='';
      showModal(projModal());
      toast('Could not open PDF: '+(err.message||String(err)));
    });
  };
  reader.readAsArrayBuffer(file);
}
/* ═══════ END PDF PARSER ═══════ */

function exportPDF(){
  var p=proj();if(!p)return;
  var g=gt(p),p2=pa(p),n=nt(p),sd=g*.05,itx=g*.02,net2=Math.max(0,n-sd-itx);

  var dA=iso(0,0,T),dB=iso(L,0,T),dC=iso(L,0,T),dD=iso(L,B,T),tA=iso(0,0,0),tB2=iso(0,0,T);
  p.push('<line x1="'+(dA[0]-8)+'" y1="'+(dA[1]-4)+'" x2="'+(dB[0]+8)+'" y2="'+(dB[1]+4)+'" stroke="#3b82f6" stroke-width="1.4" marker-start="url(#a2)" marker-end="url(#a1)"/>');
  p.push('<text x="'+((dA[0]+dB[0])/2)+'" y="'+((dA[1]+dB[1])/2-14)+'" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="700" font-family="Arial">'+d.L.toFixed(2)+' m</text>');
  p.push('<line x1="'+(dC[0]+8)+'" y1="'+(dC[1]+4)+'" x2="'+(dD[0]+10)+'" y2="'+(dD[1]+5)+'" stroke="#3b82f6" stroke-width="1.4" marker-start="url(#a2)" marker-end="url(#a1)"/>');
  p.push('<text x="'+((dC[0]+dD[0])/2+22)+'" y="'+((dC[1]+dD[1])/2+2)+'" font-size="11" fill="#1d4ed8" font-weight="700" font-family="Arial">'+d.B.toFixed(2)+' m</text>');
  p.push(vcDimV(tA[0]-30,tB2[1],tA[1],d.T.toFixed(3)+' m'));
  p.push(vcHdl(dB[0]+14,dB[1]+7,'L','ew-resize'));p.push(vcHdl(dD[0]+16,dD[1]+8,'B','ew-resize'));p.push(vcHdl(tA[0]-14,(tA[1]+tB2[1])/2,'T','ns-resize','#7c3aed'));
  return p.join('');
}
function vcDrawColumn(d,CW,CH){
  var mg=72,r=d.D/2;
  var scale=Math.min((CW-2*mg-70)/(d.D+0.6),(CH-2*mg)/d.H,88);scale=Math.min(scale,82);
  var R=r*scale,H=d.H*scale,cx=CW/2-28,cy=(CH-H)/2;
  var eRy=Math.max(R*0.26,6);
  VC_INFO={scale:scale,shape:'column',cx:cx,cy:cy,R:R,H:H};
  var p=[vcDefs(),vcBg(CW,CH)];
  p.push('<ellipse cx="'+cx+'" cy="'+(cy+H+10)+'" rx="'+(R*1.12)+'" ry="'+(R*0.22)+'" fill="rgba(0,0,0,.09)"/>');
  p.push('<defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7a6090"/><stop offset="40%" stop-color="#c4b8d8"/><stop offset="100%" stop-color="#8a70a8"/></linearGradient></defs>');
  p.push('<rect x="'+(cx-R)+'" y="'+cy+'" width="'+(2*R)+'" height="'+H+'" fill="url(#cg)" stroke="#6b4fa0" stroke-width="1.8"/>');
  p.push('<ellipse cx="'+cx+'" cy="'+(cy+H)+'" rx="'+R+'" ry="'+eRy+'" fill="#8a70b8" stroke="#6b4fa0" stroke-width="1.5"/>');
  p.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+R+'" ry="'+eRy+'" fill="#d0c4e8" stroke="#6b4fa0" stroke-width="1.5"/>');
  for(var ri=0;ri<4;ri++){var rbx=cx+(R*0.65)*Math.cos(ri*Math.PI/2);p.push('<line x1="'+rbx+'" y1="'+cy+'" x2="'+rbx+'" y2="'+(cy+H)+'" stroke="rgba(107,79,160,.18)" stroke-width="1" stroke-dasharray="4,4"/>');}
  p.push(vcDimH(cx-R,cx+R,cy-eRy-28,'D = '+d.D.toFixed(3)+' m'));
  p.push(vcDimV(cx+R+48,cy,cy+H,d.H.toFixed(2)+' m'));
  p.push('<text x="'+(cx+R+16)+'" y="'+(cy+H/2+6)+'" font-size="10" fill="#6b4fa0" font-family="Arial" font-weight="600">π·r²·H</text>');
  p.push(vcHdl(cx+R,cy+H/2,'D','ew-resize','#ea580c'));p.push(vcHdl(cx,cy,'H','ns-resize','#7c3aed'));
  return p.join('');
}
function vcDrawExcav(d,CW,CH){
  var slope=0.5,tL=d.L+2*slope*d.D;
  var scale=Math.min((CW-150)/tL,(CH/2-80)/d.D,65);scale=Math.min(scale,60);
  var W=d.L*scale,H=d.D*scale,tW=tL*scale;
  var cx=CW/2,groundY=CH/2-12;
  VC_INFO={scale:scale,shape:'excavation',cx:cx,groundY:groundY,W:W,H:H,tW:tW};
  var x1=cx-tW/2,x2=cx+tW/2,bx1=cx-W/2,bx2=cx+W/2,bot=groundY+H;
  var p=[vcDefs(),vcBg(CW,CH)];
  p.push('<rect x="0" y="0" width="'+CW+'" height="'+groundY+'" fill="#c8b090" opacity="0.3"/>');
  p.push('<line x1="0" y1="'+groundY+'" x2="'+CW+'" y2="'+groundY+'" stroke="#8b6a3a" stroke-width="2.5" stroke-dasharray="10,5"/>');
  p.push('<text x="10" y="'+(groundY-7)+'" font-size="10" fill="#8b6a3a" font-family="Arial" font-weight="700">Ground Level (G.L.)</text>');
  p.push(vcPoly([[x1,groundY],[x2,groundY],[bx2,bot],[bx1,bot]],'#e8d4a8','#8b6a3a',0));
  for(var si=0;si<6;si++){var fy2=groundY+H*(si+0.5)/6;var lx=x1+(bx1-x1)*(si+0.5)/6;var rx2=x2+(bx2-x2)*(si+0.5)/6;p.push('<line x1="'+(lx-10)+'" y1="'+fy2+'" x2="'+lx+'" y2="'+fy2+'" stroke="#8b6a3a" stroke-width="1.2" opacity="0.5"/>');p.push('<line x1="'+rx2+'" y1="'+fy2+'" x2="'+(rx2+10)+'" y2="'+fy2+'" stroke="#8b6a3a" stroke-width="1.2" opacity="0.5"/>');}
  p.push('<line x1="'+x1+'" y1="'+groundY+'" x2="'+bx1+'" y2="'+bot+'" stroke="#7a5a28" stroke-width="2.5"/>');
  p.push('<line x1="'+x2+'" y1="'+groundY+'" x2="'+bx2+'" y2="'+bot+'" stroke="#7a5a28" stroke-width="2.5"/>');
  p.push('<line x1="'+bx1+'" y1="'+bot+'" x2="'+bx2+'" y2="'+bot+'" stroke="#7a5a28" stroke-width="2.5"/>');
  p.push('<text x="'+(x1-8)+'" y="'+(groundY+H*0.42)+'" text-anchor="end" font-size="10" fill="#7a5a28" font-family="Arial" font-weight="600">1:2</text>');
  p.push(vcDimH(bx1,bx2,bot+35,'L = '+d.L.toFixed(2)+' m (bottom)'));
  p.push(vcDimH(x1,x2,groundY-32,tL.toFixed(2)+' m (top, with slopes)'));
  p.push(vcDimV(bx2+45,groundY,bot,'D = '+d.D.toFixed(2)+' m'));
  var pvS=Math.min(0.48*scale,38),pvW=d.L*pvS,pvB=d.B*pvS;
  var pvx=CW-pvW-18,pvy=groundY+H/2-pvB/2+20;
  p.push('<rect x="'+pvx+'" y="'+pvy+'" width="'+pvW+'" height="'+pvB+'" fill="#e8d4a8" stroke="#8b6a3a" stroke-width="1.5" stroke-dasharray="4,2" rx="2"/>');
  p.push('<text x="'+(pvx+pvW/2)+'" y="'+(pvy+pvB/2)+'" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#8b6a3a" font-family="Arial" font-weight="600">PLAN</text>');
  p.push(vcDimH(pvx,pvx+pvW,pvy+pvB+20,d.L.toFixed(1)));p.push(vcDimV(pvx-18,pvy,pvy+pvB,d.B.toFixed(1)));
  p.push(vcHdl(bx2,bot,'L','ew-resize'));p.push(vcHdl(cx,bot,'D','ns-resize','#7c3aed'));p.push(vcHdl(pvx+pvW,pvy+pvB/2,'B','ew-resize','#ea580c'));
  return p.join('');
}
function vcSVGContent(){var d=VC_DV[VC_ST.shape],CW=560,CH=380;if(VC_ST.shape==='wall')return vcDrawWall(d,CW,CH);if(VC_ST.shape==='slab')return vcDrawSlab(d,CW,CH);if(VC_ST.shape==='column')return vcDrawColumn(d,CW,CH);if(VC_ST.shape==='excavation')return vcDrawExcav(d,CW,CH);return vcDrawWall(d,CW,CH);}
function renderVisualCalc(p){
  var vc=p.vc||(p.vc={shape:'wall',nos:1,deds:[],tgt:''});
  VC_ST.shape=vc.shape||'wall';VC_ST.nos=vc.nos||1;VC_ST.deds=vc.deds||[];
  var shapeBtns=Object.keys(VC_SHAPES).map(function(k){var s=VC_SHAPES[k];return'<button class="vc-sbtn'+(VC_ST.shape===k?' on':'')+'" onclick="vcSetShape(\''+k+'\')">'+s.icon+' '+s.label+'</button>';}).join('');
  var cfg=VC_SHAPES[VC_ST.shape],d=VC_DV[VC_ST.shape];
  var dimPanel=Object.keys(cfg.dims).map(function(k){var def=cfg.dims[k];var dec=(k==='T'||k==='D')?3:2;return'<div class="vc-dim-row"><div class="vc-dim-lbl"><span>'+def.l+'</span><span class="vc-dim-val" id="vc-dv-'+k+'">'+d[k].toFixed(dec)+' m</span></div><div style="display:flex;align-items:center;gap:6px"><input type="range" class="vc-slider" id="vc-sl-'+k+'" min="'+def.min+'" max="'+def.max+'" step="'+def.step+'" value="'+d[k]+'" oninput="vcSlider(\''+k+'\',this.value)"><input type="number" class="vc-num" id="vc-ni-'+k+'" min="'+def.min+'" max="'+def.max+'" step="'+def.step+'" value="'+d[k]+'" onchange="vcNumIn(\''+k+'\',this.value)"></div></div>';}).join('');
  var results=cfg.calcs(d,VC_ST.nos,VC_ST.deds);
  var calcPanel=results.map(function(r){if(r.formula)return'<div class="vc-formula">'+r.formula.replace(/\n/g,'<br>')+'</div>';return'<div class="vc-calc-row"><span style="color:var(--k3)">'+r.l+'</span><span class="vc-cval'+(r.hi?'':' sm')+'">'+r.v+'<span style="font-size:9px;color:var(--k4);margin-left:3px">'+r.u+'</span></span></div>';}).join('');
  var itemOpts='<option value="">— Select MB item —</option>'+(p.items||[]).map(function(it){return'<option value="'+it.id+'"'+(vc.tgt===it.id?' selected':'')+'>'+esc(it.name)+'</option>';}).join('');
  // Deductions panel (only show for wall shape)
  var dedSection='';
  if(VC_ST.shape==='wall'){
    var dedRows=VC_ST.deds.length
      ?VC_ST.deds.map(function(dd,i){return'<div class="vc-ded-row"><span style="margin-right:4px">'+(dd.type==='door'?'🚪':'🪟')+'</span><span class="vc-ded-lbl">'+dd.nos+'× '+dd.W.toFixed(2)+'m × '+dd.H.toFixed(2)+'m</span><button class="vc-ded-del" onclick="vcRemDed('+i+')" title="Remove">✕</button></div>';}).join('')
      :'<div style="font-size:11px;color:var(--k4);padding:4px 0 5px">No openings yet</div>';
    dedSection='<div class="vc-ded-section">'+
      '<div class="vc-ded-hdr"><span style="font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--k3)">Openings / Deductions</span></div>'+
      dedRows+
      '<div class="vc-add-ded-row">'+
      '<select id="vc-ded-type" style="border:1px solid var(--br);border-radius:4px;padding:3px 5px;font-size:11px;background:#fff;flex:1"><option value="window">🪟 Window</option><option value="door">🚪 Door</option></select>'+
      '<input type="number" class="vc-add-ded-inp" id="vc-ded-nos" value="1" min="1" max="20" title="Count (Nos)">'+
      '<input type="number" class="vc-add-ded-inp" id="vc-ded-w" value="1.20" min="0.2" max="10" step="0.05" title="Width (m)">'+
      '<input type="number" class="vc-add-ded-inp" id="vc-ded-h" value="1.50" min="0.2" max="6" step="0.05" title="Height (m)">'+
      '<button class="btn tl sm" onclick="vcAddDed()" style="padding:4px 8px;font-size:13px;line-height:1" title="Add opening">+</button>'+
      '</div>'+
      '<div style="font-size:9px;color:var(--k4);margin-top:4px">← Count &nbsp;|&nbsp; W(m) &nbsp;|&nbsp; H(m)</div>'+
      '</div>';
  }
  return'<div class="vc-shape-bar">'+shapeBtns+'</div>'+
    '<div class="vc-layout">'+
    '<div class="vc-canvas"><svg id="vc-svg" viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg">'+vcSVGContent()+'</svg></div>'+
    '<div class="vc-panel">'+
    '<div style="font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--k3);margin-bottom:10px">Dimensions</div>'+
    dimPanel+
    '<div class="vc-nos-row"><span style="font-size:11px;color:var(--k3)">Nos.</span><input class="vc-nos-inp" type="number" id="vc-nos" min="1" max="9999" value="'+VC_ST.nos+'"><span style="font-size:11px;color:var(--k4)">items</span></div>'+
    dedSection+
    '<div style="font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--k3);margin-bottom:8px;'+(VC_ST.shape==='wall'?'margin-top:10px;padding-top:10px;border-top:1px solid var(--s3)':'')+'">Live Calculations</div>'+
    '<div id="vc-calcs">'+calcPanel+'</div>'+
    '<div style="margin-top:11px;padding-top:10px;border-top:1px solid var(--s3)">'+
    '<div style="font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--k3);margin-bottom:7px">Send to Measurement Book</div>'+
    '<select class="sel wf" id="vc-tgt" style="margin-bottom:7px">'+itemOpts+'</select>'+
    '<button class="btn tl wf" onclick="vcAddToMB()">+ Add Row to Selected Item</button></div>'+
    '<div class="vc-hint">🟠 Drag orange handles to resize<br>🟣 Purple handle = thickness<br>🪟 Add windows/doors above</div>'+
    '</div></div>';
}
function vcAddDed(){
  var type=document.getElementById('vc-ded-type');
  var nos=document.getElementById('vc-ded-nos');
  var w=document.getElementById('vc-ded-w');
  var h=document.getElementById('vc-ded-h');
  if(!type||!nos||!w||!h)return;
  var n=Math.max(1,parseInt(nos.value)||1);
  var W=Math.max(0.1,parseFloat(w.value)||1.2);
  var H=Math.max(0.1,parseFloat(h.value)||1.5);
  var d=VC_DV['wall'];
  if(W>=d.L){toast('Window width must be less than wall length');return;}
  if(H>=d.H){toast('Window height must be less than wall height');return;}
  VC_ST.deds.push({type:type.value,nos:n,W:W,H:H});
  var p=proj();if(p&&p.vc)p.vc.deds=VC_ST.deds;
  saveState();
  var el=document.getElementById('main-content');
  if(el){el.innerHTML=renderVisualCalc(p||{vc:{},items:[]});hookVC(p||{});}
}
function vcRemDed(i){
  VC_ST.deds.splice(i,1);
  var p=proj();if(p&&p.vc)p.vc.deds=VC_ST.deds;
  saveState();
  var el=document.getElementById('main-content');
  if(el){el.innerHTML=renderVisualCalc(p||{vc:{},items:[]});hookVC(p||{});}
}
function hookVC(p){
  var svg=document.getElementById('vc-svg');if(!svg)return;
  var nos=document.getElementById('vc-nos');
  if(nos)nos.addEventListener('change',function(){VC_ST.nos=Math.max(1,parseInt(this.value)||1);if(p.vc)p.vc.nos=VC_ST.nos;saveState();vcRefreshCalcs();});
  var tgt=document.getElementById('vc-tgt');
  if(tgt)tgt.addEventListener('change',function(){VC_ST.tgt=this.value;if(p.vc)p.vc.tgt=this.value;});
  svg.addEventListener('mousedown',function(e){var h=e.target.dataset&&e.target.dataset.handle;if(!h)return;e.preventDefault();VC_DRAG={active:true,handle:h,sx:e.clientX,sy:e.clientY,sv:VC_DV[VC_ST.shape][h]||0};document.body.style.userSelect='none';});
  svg.addEventListener('touchstart',function(e){var h=e.target.dataset&&e.target.dataset.handle;if(!h)return;e.preventDefault();var t=e.touches[0];VC_DRAG={active:true,handle:h,sx:t.clientX,sy:t.clientY,sv:VC_DV[VC_ST.shape][h]||0};},{passive:false});
}
function vcMoveHandler(cx,cy){
  if(!VC_DRAG.active)return;
  var svg=document.getElementById('vc-svg');if(!svg)return;
  var h=VC_DRAG.handle,cfg=VC_SHAPES[VC_ST.shape];if(!cfg||!cfg.dims[h])return;
  var def=cfg.dims[h];
  var rect=svg.getBoundingClientRect();
  var sc=VC_INFO.scale*(rect.width/560);if(sc<=0)return;
  var dx=cx-VC_DRAG.sx,dy=cy-VC_DRAG.sy,nv;
  if(h==='L'||h==='B')nv=VC_DRAG.sv+dx/sc;
  else if(h==='H'||h==='D')nv=VC_DRAG.sv-dy/sc;
  else if(h==='T'){nv=VC_ST.shape==='wall'?VC_DRAG.sv+(dx-dy)/(sc*1.8*(1/(VC_INFO.dRatio||0.32))):VC_DRAG.sv-dy/sc;}
  else nv=VC_DRAG.sv+dx/sc;
  nv=Math.round(nv/def.step)*def.step;nv=Math.max(def.min,Math.min(def.max,nv));
  if(Math.abs(nv-(VC_DV[VC_ST.shape][h]||0))>1e-9){VC_DV[VC_ST.shape][h]=nv;vcRedraw();vcRefreshDimPanel();vcRefreshCalcs();}
}
document.addEventListener('mousemove',function(e){vcMoveHandler(e.clientX,e.clientY);});
document.addEventListener('touchmove',function(e){if(VC_DRAG.active){vcMoveHandler(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
document.addEventListener('mouseup',function(){if(VC_DRAG.active){VC_DRAG.active=false;document.body.style.userSelect='';}});
document.addEventListener('touchend',function(){VC_DRAG.active=false;});
function vcRedraw(){var svg=document.getElementById('vc-svg');if(svg)svg.innerHTML=vcSVGContent();}
function vcRefreshDimPanel(){var cfg=VC_SHAPES[VC_ST.shape],d=VC_DV[VC_ST.shape];Object.keys(cfg.dims).forEach(function(k){var dec=(k==='T'||k==='D')?3:2;var dv=document.getElementById('vc-dv-'+k);var sl=document.getElementById('vc-sl-'+k);var ni=document.getElementById('vc-ni-'+k);if(dv)dv.textContent=d[k].toFixed(dec)+' m';if(sl)sl.value=d[k];if(ni)ni.value=d[k];});}
function vcRefreshCalcs(){var el=document.getElementById('vc-calcs');if(!el)return;var cfg=VC_SHAPES[VC_ST.shape],d=VC_DV[VC_ST.shape];el.innerHTML=cfg.calcs(d,VC_ST.nos,VC_ST.deds).map(function(r){if(r.formula)return'<div class="vc-formula">'+r.formula.replace(/\n/g,'<br>')+'</div>';return'<div class="vc-calc-row"><span style="color:var(--k3)">'+r.l+'</span><span class="vc-cval'+(r.hi?'':' sm')+'">'+r.v+'<span style="font-size:9px;color:var(--k4);margin-left:3px">'+r.u+'</span></span></div>';}).join('');}
function vcSlider(k,v){VC_DV[VC_ST.shape][k]=parseFloat(v);vcRedraw();vcRefreshDimPanel();vcRefreshCalcs();}
function vcNumIn(k,v){var def=VC_SHAPES[VC_ST.shape].dims[k];var val=Math.max(def.min,Math.min(def.max,parseFloat(v)||def.v));VC_DV[VC_ST.shape][k]=val;vcRedraw();vcRefreshDimPanel();vcRefreshCalcs();}
function vcSetShape(s){VC_ST.shape=s;var p=proj();if(p&&p.vc)p.vc.shape=s;saveState();var el=document.getElementById('main-content');if(el){el.innerHTML=renderVisualCalc(p||{vc:{},items:[]});hookVC(p||{});}}
function vcAddToMB(){
  var p=proj();if(!p)return;
  var tgt=document.getElementById('vc-tgt');var iid=tgt?tgt.value:'';
  if(!iid){toast('Select a target MB item first');return;}
  var item=p.items.find(function(it){return it.id===iid});if(!item){toast('Item not found');return;}
  var cfg=VC_SHAPES[VC_ST.shape],d=VC_DV[VC_ST.shape],dims=Object.keys(cfg.dims);
  var row=nr();row.desc=cfg.label+' (Visual Calc)';
  if(VC_ST.nos>1)row.nos=String(VC_ST.nos);
  if(dims.includes('L'))row.L=String(d.L);
  if(dims.includes('B'))row.B=String(d.B);
  if(dims.includes('H'))row.H=String(d.H);
  if(dims.includes('T'))row.D=String(d.T);
  if(VC_ST.shape==='excavation'&&dims.includes('D'))row.D=String(d.D);
  if(VC_ST.shape==='column'){row.L='pi*'+String((d.D/2).toFixed(4))+'*'+String((d.D/2).toFixed(4));row.B='';row.D=String(d.H);}
  item.rows.push(row);p.expanded[iid]=true;saveState();switchTab('mb');
  toast('Row added to "'+item.name.substring(0,28)+'"');
}
function openVisual(){switchTab('vc');}
/* ═══════ END VISUAL CALCULATOR ═══════ */



document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='n'||e.key==='N'){openNewProject();}
  else if(e.key==='r'||e.key==='R'){recordBill();}
  else if(e.key==='e'||e.key==='E'){exportPDF();}
  else if(e.key==='1'){switchTab('dashboard');}
  else if(e.key==='2'){switchTab('boq');}
  else if(e.key==='3'){switchTab('mb');}
  else if(e.key==='4'){switchTab('bill');}
  else if(e.key==='5'){switchTab('export');}
  else if(e.key==='Escape'){closeModal();}
});

/* ═══════ INIT ═══════ */
var restored=loadState();
if(!restored||APP.projects.length===0){
  // Fresh start — show onboarding
  APP={activeProjectId:null,projects:[]};
}
render();
</script>
